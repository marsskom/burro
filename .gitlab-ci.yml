# You can override the included template(s) by including variable overrides
# SAST customization: https://docs.gitlab.com/user/application_security/sast/#available-cicd-variables
# Secret Detection customization: https://docs.gitlab.com/user/application_security/secret_detection/pipeline/configure/
# Dependency Scanning customization: https://docs.gitlab.com/user/application_security/dependency_scanning/dependency_scanning_sbom/#customizing-analyzer-behavior
# Container Scanning customization: https://docs.gitlab.com/user/application_security/container_scanning/#customizing-analyzer-behavior
# Note that environment variables can be set in several places
# See https://docs.gitlab.com/ci/variables/#cicd-variable-precedence
stages:
  - test
  - secret-detection
  - build
  - release

variables:
  SECRET_DETECTION_ENABLED: "true"
  GIT_DEPTH: 0

# Security.
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

sast:
  stage: test

secret_detection:
  stage: secret-detection

# Test Stage.
test:
  image: golang:1.26
  stage: test
  script:
    - go test ./internal/...
    - go test ./plugins/...

# Build Stage (tags only).
build:
  image: golang:1.26
  stage: build
  needs: ["test"]
  rules:
    - if: $CI_COMMIT_TAG

  script:
    - chmod +x scripts/build.sh
    - VERSION=$CI_COMMIT_TAG ./scripts/build.sh

  artifacts:
    paths:
      - dist/

# Release stage.
release:
  image: registry.gitlab.com/gitlab-org/cli:latest
  stage: release
  needs: ["build"]

  rules:
    - if: $CI_COMMIT_TAG

  script:
    - |
      if [ -f "releases/${CI_COMMIT_TAG}.md" ]; then
        NOTES_FILE="releases/${CI_COMMIT_TAG}.md"
      else
        PREV_TAG=$(git describe --tags --abbrev=0 "$CI_COMMIT_TAG^" 2>/dev/null || true)

        if [ -n "$PREV_TAG" ]; then
          git log --pretty=format:"- %s" "$PREV_TAG..$CI_COMMIT_TAG" > generated-release.md
        else
          git log --pretty=format:"- %s" > generated-release.md
        fi

        NOTES_FILE="generated-release.md"
      fi

      glab release create "$CI_COMMIT_TAG" \
        --name "Burro $CI_COMMIT_TAG" \
        --notes-file "$NOTES_FILE" \
        --assets-link "{\"name\":\"Linux AMD64\",\"url\":\"$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/dist/burro-${CI_COMMIT_TAG}-linux-amd64.tar.gz?job=build\"}" \
        --assets-link "{\"name\":\"Linux ARM64\",\"url\":\"$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/dist/burro-${CI_COMMIT_TAG}-linux-arm64.tar.gz?job=build\"}" \
        --assets-link "{\"name\":\"macOS ARM64\",\"url\":\"$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/dist/burro-${CI_COMMIT_TAG}-darwin-arm64.tar.gz?job=build\"}" \
        --assets-link "{\"name\":\"Checksums\",\"url\":\"$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/dist/checksums.txt?job=build\"}"
