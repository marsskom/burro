version: "2"
sql:
  - engine: "sqlite"
    queries: "sql/queries"
    schema: "sql/schema"
    gen:
      go:
        out: "internal/database"
        overrides:
          - go_type: "github.com/google/uuid.UUID"
            db_type: "text"

          - go_type: "bool"
            db_type: "integer"
