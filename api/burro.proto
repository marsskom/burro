syntax = "proto3";

package burro;

option go_package = "gitlab.com/marsskom/burro/internal/proto;proto";

service Burro {
  rpc Ping(PingRequest) returns (PingResponse);

  rpc Subscribe(SubscribeRequest) returns (stream Event);
}

message PingRequest {}

message PingResponse {
  string message = 1;
}

message SubscribeRequest {
  repeated TransportType transport_type = 1;
  repeated EventType event_types = 2;
}

enum TransportType {
  TRANSPORT_HTTP = 0;
  TRANSPORT_WS = 1;
}

enum EventType {
  EVENT_CONNECT = 0;
  EVENT_REQUEST = 1;
  EVENT_RESPONSE = 2;
  EVENT_ERROR = 3;
  EVENT_CLOSE = 4;

  EVENT_WS_CONNECT = 10;
  EVENT_WS_MESSAGE = 11;
  EVENT_WS_CLOSE = 12;
}

message HTTPEvent {
  string proto = 1;
  string scheme = 2;
  string host = 3;
  string method = 4;
  string url = 5;
  string path = 6;
  int64 content_length = 7;
  string remote_addr = 8;

  int64 start_time = 9;
  int32 state = 10;
  bool is_finished = 11;

  string query_params = 12; // JSON
  string headers = 13;      // JSON
  string cookies = 14;      // JSON

  bytes request_body = 15;

  string response_status = 16;
  int32 response_status_code = 17;
  string response_proto = 18;
  string response_headers = 19; // JSON
  int64 response_content_length = 20;
  bytes response_body = 21;

  int64 created_at = 22;
  int64 updated_at = 23;

  string metadata = 24; // JSON
}

message WSEvent {
  int32 opcode = 1;
  string direction = 2;
  bytes data = 3;
  string text = 4;
  int64 timestamp = 5;
}

message Event {
  TransportType transport_type = 1;
  EventType type = 2;

  string id = 3;
  string session_id = 4;

  int64 timestamp = 5;

  HTTPEvent http = 6;
  WSEvent ws = 7;
}

